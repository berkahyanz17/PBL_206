services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: db_praktikum
    volumes:
      - db_data:/var/lib/mysql
      - ./db_praktikum.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app_network

  server:
    build: ./server
    restart: always
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: secret
      DB_NAME: db_praktikum
      JWT_SECRET: REDACTED
      MAIL_PASS: REDACTED
      HCAPTCHA_SECRET: REDACTED
      REDIS_URL: redis://redis:6379
      # ── Mamoru Chatbot ──────────────────────────────
      GEMINI_API_KEY: REDACTED
      TELEGRAM_BOT_TOKEN: REDACTED
      TELEGRAM_CHAT_ID: -5022288086
    depends_on:
      - db
      - redis
    networks:
      - app_network
    volumes:
      - uploads_data:/app/uploads

  client:
    build:
      context: ./client
      args:
        - VITE_HCAPTCHA_SITEKEY: 97304a14-ac8e-473a-b1b2-f6aa751631f2
    restart: always
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/ssl/certs/server.crt:/etc/ssl/certs/server.crt
      - /etc/ssl/private/server.key:/etc/ssl/private/server.key
      - /etc/ssl/certs/ca-chain.crt:/etc/ssl/certs/ca-chain.crt
    depends_on:
      - server
      - client
    networks:
      - app_network

volumes:
  db_data:
  uploads_data:

networks:
  app_network:
