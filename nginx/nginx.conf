limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2  on;
    server_name _;

    ssl_certificate         /etc/ssl/certs/server.crt;
    ssl_certificate_key     /etc/ssl/private/server.key;
    ssl_trusted_certificate /etc/ssl/certs/ca-chain.crt;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    # Google Fonts allowed in style-src and font-src
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' https://js.hcaptcha.com https://newassets.hcaptcha.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://newassets.hcaptcha.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://newassets.hcaptcha.com; connect-src 'self' https://api2.hcaptcha.com https://sentry.hcaptcha.com; frame-src https://newassets.hcaptcha.com; frame-ancestors 'none';" always;

    client_max_body_size 10M;
    server_tokens        off;

    resolver 127.0.0.11 valid=30s;

    set $backend  http://server:3001;
    set $frontend http://client:80;

    location / {
        proxy_pass         $frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
    }

    # Auth — strictest limit (must come before /api/ block)
    location ~* ^/api/(login|register|forgot-password|reset-password) {
        limit_req  zone=auth burst=3 nodelay;

        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
    }

    # Upload
    location /api/upload {
        limit_req  zone=upload burst=5 nodelay;

        client_max_body_size 10M;

        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 60s;
    }

    # General API
    location /api/ {
        limit_req  zone=api burst=30 nodelay;

        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_hide_header  X-Powered-By;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location /uploads/ {
        location ~* \.(php|js|sh|py|pl|cgi)$ {
            deny all;
        }

        proxy_pass        $backend;
        proxy_set_header  Host         $host;
        proxy_set_header  X-Real-IP    $remote_addr;

        add_header X-Content-Type-Options "nosniff"    always;
        add_header Content-Disposition    "attachment"  always;
    }

    location /health {
        allow 172.0.0.0/8;
        deny  all;
        proxy_pass $backend;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
