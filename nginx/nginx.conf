# ── Rate limiting zones (defined in http context via include) ─────────────────
# These are declared at the server level; if you have an nginx.conf wrapper
# that includes this file inside an http{} block, move limit_req_zone there.
limit_req_zone $binary_remote_addr zone=api:10m    rate=20r/m;
limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow ACME challenge for Let's Encrypt renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate         /etc/ssl/certs/server.crt;
    ssl_certificate_key     /etc/ssl/private/server.key;
    ssl_trusted_certificate /etc/ssl/certs/ca-chain.crt;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                          always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header X-XSS-Protection           "1; mode=block"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"      always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── General ───────────────────────────────────────────────────────────────
    client_max_body_size 10M;
    server_tokens        off;          # hide nginx version

    resolver 127.0.0.11 valid=30s;

    set $backend http://server:3001;
    set $frontend http://client:80;

    # ── React SPA ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         $frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
    }

    # ── API endpoints ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api burst=10 nodelay;

        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_hide_header  X-Powered-By;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ── Auth endpoints (stricter rate limit) ──────────────────────────────────
    location ~* ^/api/(login|register|forgot-password|reset-password) {
        limit_req  zone=auth burst=3 nodelay;

        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
    }

    # ── File uploads ──────────────────────────────────────────────────────────
    location /api/upload {
        limit_req  zone=upload burst=5 nodelay;

        client_max_body_size 10M;

        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;

        proxy_read_timeout 60s;
    }

    # ── Uploaded file serving ─────────────────────────────────────────────────
    location /uploads/ {
        # Only allow image/document types — block direct script execution
        location ~* \.(php|js|sh|py|pl|cgi)$ {
            deny all;
        }

        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Disposition "attachment"  always;
    }

    # ── Health check (internal only — block from public) ─────────────────────
    location /health {
        allow 172.0.0.0/8;   # Docker internal networks
        deny  all;
        proxy_pass $backend;
    }

    # ── Block hidden files (.env, .git, etc.) ─────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
